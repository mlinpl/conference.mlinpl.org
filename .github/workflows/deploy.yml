name: Build and Deploy Unified Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # "Manual Button"
  repository_dispatch:  # Allows submodule repos to trigger this build
    types: [submodule_update]

# --- CONFIGURATION ---
env:
  RUBY_VERSION: "3.1"
# ---------------------

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Build unified site
        run: |
          UPDATE_SUBMODULES=true \
          GENERATE_VERSIONS=true \
          GENERATE_SITEMAP_INDEX=true \
          COPY_ROOT_FILES=true \
          bash scripts/build_unified_site.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
